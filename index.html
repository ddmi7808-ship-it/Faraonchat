<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FARAONCHAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-yellow-500 h-screen flex flex-col p-4">
    <div class="max-w-md mx-auto w-full flex flex-col h-full border border-yellow-900 rounded-2xl p-4 shadow-2xl bg-gray-950">
        <div class="flex items-center gap-3 mb-4 border-b border-yellow-800 pb-2">
            <img src="https://api.dicebear.com/8.x/bottts/svg?seed=Faraon" class="w-12 h-12 rounded-full border border-yellow-500">
            <h1 class="text-2xl font-black italic">FARAONCHAT</h1>
        </div>

        <div id="auth" class="space-y-4">
            <input id="u" type="text" placeholder="Имя" class="w-full p-2 rounded bg-gray-900 border border-yellow-800 outline-none">
            <input id="p" type="password" placeholder="Пароль" class="w-full p-2 rounded bg-gray-900 border border-yellow-800 outline-none">
            <button onclick="auth()" class="w-full bg-yellow-600 text-black font-bold p-2 rounded hover:bg-yellow-500">ВОЙТИ</button>
        </div>

        <div id="chat" class="hidden flex-col h-full overflow-hidden">
            <div id="msgs" class="flex-1 overflow-y-auto space-y-2 mb-4 pr-2"></div>
            <div class="flex flex-col gap-2 border-t border-yellow-900 pt-2">
                <input id="to" type="text" placeholder="Кому..." class="w-full p-1 text-sm rounded bg-gray-800 outline-none">
                <div class="flex gap-2">
                    <input id="m" type="text" placeholder="Твое слово..." class="flex-1 p-2 rounded bg-gray-800 outline-none">
                    <button onclick="send()" class="bg-yellow-600 text-black px-4 rounded font-bold">></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws, my;
        async function auth() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            await fetch('/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
            const r = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
            const d = await r.json();
            if(d.token) {
                my = u;
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('chat').classList.replace('hidden', 'flex');
                const prot = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${prot}//${location.host}/ws/${my}`);
                ws.onmessage = e => {
                    const data = JSON.parse(e.data);
                    add(data.from, data.content, false);
                };
            }
        }
        function send() {
            const to = document.getElementById('to').value, c = document.getElementById('m').value;
            ws.send(JSON.stringify({to:to, content:c}));
            add('Я', c, true);
            document.getElementById('m').value = '';
        }
        function add(f, c, self) {
            const d = document.createElement('div');
            d.className = `p-2 rounded-lg max-w-[80%] ${self ? 'bg-yellow-700 ml-auto text-black' : 'bg-gray-800 text-yellow-200'}`;
            d.innerHTML = `<span class="text-[10px] block opacity-50">${f}</span>${c}`;
            document.getElementById('msgs').appendChild(d);
            document.getElementById('msgs').scrollTop = 99999;
        }
    </script>
</body>
</html>
