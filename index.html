<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FARAONCHAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-yellow-500 h-screen flex flex-col p-4">
    <div class="max-w-md mx-auto w-full flex flex-col h-full border border-yellow-900 rounded-2xl p-4 shadow-2xl bg-gray-950">
        
        <div class="flex items-center gap-3 mb-4 border-b border-yellow-800 pb-2">
            <img src="https://api.dicebear.com/8.x/bottts/svg?seed=FaraonChat&backgroundColor=b6e3f4" class="w-12 h-12 rounded-full border border-yellow-500 shadow-md shadow-yellow-500/20">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">Faraon Chat</h1>
                <div id="status" class="text-[10px] text-gray-500 uppercase font-bold">Офлайн</div>
            </div>
        </div>

        <div id="auth-box" class="space-y-4 my-auto">
            <div class="text-center mb-6">
                <p class="text-sm text-yellow-700 font-bold uppercase tracking-widest">Вход в гробницу</p>
            </div>
            <input id="username" type="text" placeholder="Имя пользователя" class="w-full p-3 rounded-xl bg-gray-900 border border-yellow-900 outline-none text-white">
            <input id="password" type="password" placeholder="Пароль" class="w-full p-3 rounded-xl bg-gray-900 border border-yellow-900 outline-none text-white">
            
            <div class="flex gap-2">
                <button onclick="doLogin()" class="flex-1 bg-yellow-600 text-black font-black p-3 rounded-xl hover:bg-yellow-500 active:scale-95 transition-all">ВОЙТИ</button>
                <button onclick="doRegister()" class="flex-1 border border-yellow-600 text-yellow-600 font-black p-3 rounded-xl hover:bg-yellow-900/20 active:scale-95 transition-all text-sm">РЕГИСТРАЦИЯ</button>
            </div>
        </div>

        <div id="chat-box" class="hidden flex-col h-full overflow-hidden">
            <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 custom-scrollbar"></div>
            <div class="flex flex-col gap-2 border-t border-yellow-900 pt-3">
                <input id="target-user" type="text" placeholder="Кому..." class="bg-transparent text-sm text-yellow-500 outline-none border-b border-yellow-900">
                <div class="flex gap-2">
                    <input id="message-text" type="text" placeholder="Твое слово..." class="flex-1 p-3 rounded-xl bg-gray-900 border border-yellow-900 text-white">
                    <button onclick="doSendMessage()" class="bg-yellow-600 text-black px-5 rounded-xl font-black">></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket, myName;

        function getAvatar(name) {
            return `https://api.dicebear.com/8.x/avataaars/svg?seed=${name}&backgroundColor=d4a72c`;
        }

        async function doRegister() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Заполни поля!");

            const response = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });

            if(response.ok) {
                alert("Аккаунт создан! Теперь жми 'ВОЙТИ'.");
            } else {
                const data = await response.json();
                alert("Ошибка: " + (data.detail || "Юзер уже есть"));
            }
        }

        async function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                
                const data = await response.json();

                if(data.token || data.access_token) {
                    myName = u;
                    document.getElementById('auth-box').classList.add('hidden');
                    document.getElementById('chat-box').classList.replace('hidden', 'flex');
                    document.getElementById('status').innerText = "В сети: " + myName;
                    document.getElementById('status').style.color = "#22c55e";
                    
                    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                    socket = new WebSocket(`${protocol}//${location.host}/ws/${myName}`);
                    
                    socket.onmessage = event => {
                        const msg = JSON.parse(event.data);
                        addMsg(msg.from, msg.content, false);
                    };
                } else {
                    alert("Стража не пускает! Проверь пароль.");
                }
            } catch (err) { alert("Сервер спит. Подожди 30 сек."); }
        }

        function doSendMessage() {
            const to = document.getElementById('target-user').value.trim();
            const content = document.getElementById('message-text').value;
            if(!to || !content) return;
            socket.send(JSON.stringify({to: to, content: content}));
            addMsg('Вы', content, true);
            document.getElementById('message-text').value = '';
        }

        function addMsg(user, text, isMe) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `flex items-start gap-2 ${isMe ? 'flex-row-reverse' : ''}`;
            div.innerHTML = `
                <img src="${getAvatar(user === 'Вы' ? myName : user)}" class="w-8 h-8 rounded-full">
                <div class="p-3 rounded-2xl ${isMe ? 'bg-yellow-600 text-black' : 'bg-gray-800 text-yellow-200'}">
                    <p class="text-sm">${text}</p>
                </div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
