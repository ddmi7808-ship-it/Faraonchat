<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FARAONCHAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-yellow-500 h-screen flex flex-col p-4">
    <div class="max-w-md mx-auto w-full flex flex-col h-full border border-yellow-900 rounded-2xl p-4 shadow-2xl bg-gray-950">
        
        <div class="flex items-center gap-3 mb-4 border-b border-yellow-800 pb-2">
            <img src="https://api.dicebear.com/8.x/bottts/svg?seed=FaraonChat&backgroundColor=b6e3f4" class="w-12 h-12 rounded-full border border-yellow-500 shadow-md shadow-yellow-500/20">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">Faraon Chat</h1>
                <div id="status" class="text-[10px] text-gray-500 uppercase font-bold">Статус: Офлайн</div>
            </div>
        </div>

        <div id="auth-box" class="space-y-4 my-auto">
            <div class="text-center mb-6">
                <p class="text-sm text-yellow-700 font-bold uppercase tracking-widest">Вход в гробницу</p>
            </div>
            <input id="username" type="text" placeholder="Имя пользователя" class="w-full p-3 rounded-xl bg-gray-900 border border-yellow-900 outline-none focus:ring-1 focus:ring-yellow-500 transition-all text-white">
            <input id="password" type="password" placeholder="Пароль" class="w-full p-3 rounded-xl bg-gray-900 border border-yellow-900 outline-none focus:ring-1 focus:ring-yellow-500 transition-all text-white">
            
            <div class="flex gap-2">
                <button onclick="handleLogin()" class="flex-1 bg-yellow-600 text-black font-black p-3 rounded-xl hover:bg-yellow-500 active:scale-95 transition-all shadow-lg shadow-yellow-600/20">ВОЙТИ</button>
                <button onclick="handleRegister()" class="flex-1 border border-yellow-600 text-yellow-600 font-black p-3 rounded-xl hover:bg-yellow-900/20 active:scale-95 transition-all text-sm">РЕГИСТРАЦИЯ</button>
            </div>
            <p class="text-[10px] text-center text-gray-600 italic">Сначала нажми "Регистрация", если заходишь впервые.</p>
        </div>

        <div id="chat-box" class="hidden flex-col h-full overflow-hidden">
            <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 custom-scrollbar"></div>
            
            <div class="flex flex-col gap-2 border-t border-yellow-900 pt-3">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-yellow-700 uppercase font-black">Кому:</span>
                    <input id="target-user" type="text" placeholder="Имя получателя..." class="flex-1 bg-transparent text-sm text-yellow-500 outline-none border-b border-yellow-900 focus:border-yellow-500 transition-all">
                </div>
                <div class="flex gap-2">
                    <input id="message-text" type="text" placeholder="Твое слово..." class="flex-1 p-3 rounded-xl bg-gray-900 border border-yellow-900 outline-none focus:ring-1 focus:ring-yellow-500 text-white shadow-inner">
                    <button onclick="sendMessage()" class="bg-yellow-600 text-black px-5 rounded-xl font-black hover:bg-yellow-500 active:scale-90 transition-all shadow-lg shadow-yellow-600/20">></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket, myName;

        function getAvatar(name) {
            return `https://api.dicebear.com/8.x/avataaars/svg?seed=${name}&backgroundColor=d4a72c`;
        }

        async function handleRegister() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Заполни поля!");

            const response = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });

            if(response.ok) {
                alert("Аккаунт создан! Теперь жми 'ВОЙТИ'.");
            } else {
                const data = await response.json();
                alert("Ошибка: " + (data.detail || "Юзер уже существует"));
            }
        }

        async function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Введи данные!");

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                
                const data = await response.json();

                if(data.token || data.access_token) {
                    myName = u;
                    document.getElementById('auth-box').classList.add('hidden');
                    document.getElementById('chat-box').classList.replace('hidden', 'flex');
                    document.getElementById('status').innerText = "В сети: " + myName;
                    document.getElementById('status').classList.replace('text-gray-500', 'text-green-500');
                    
                    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                    socket = new WebSocket(`${protocol}//${location.host}/ws/${myName}`);
                    
                    socket.onmessage = event => {
                        const msg = JSON.parse(event.data);
                        displayMessage(msg.from, msg.content, false);
                    };

                    socket.onclose = () => {
                        document.getElementById('status').innerText = "Связь потеряна";
                        document.getElementById('status').classList.replace('text-green-500', 'text-red-500');
                    };
                } else {
                    alert("Стража не пускает! Проверь пароль.");
                }
            } catch (err) {
                alert("Ошибка связи с сервером.");
            }
        }

        function sendMessage() {
            const to = document.getElementById('target-user').value.trim();
            const content = document.getElementById('message-text').value;
            if(!to || !content) return;
            
            socket.send(JSON.stringify({to: to, content: content, type: 'text'}));
            displayMessage(myName, content, true);
            document.getElementById('message-text').value = '';
        }

        function displayMessage(user, text, isMe) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `flex items-start gap-2 ${isMe ? 'flex-row-reverse' : ''}`;
            
            div.innerHTML = `
                <img src="${getAvatar(user)}" class="w-8 h-8 rounded-full border border-yellow-900 bg-gray-800">
                <div class="p-3 rounded-2xl max-w-[75%] shadow-sm ${isMe ? 'bg-yellow-600 text-black rounded-tr-none' : 'bg-gray-800 text-yellow-200 rounded-tl-none border border-yellow-900/30'}">
                    <span class="text-[9px] block font-bold uppercase opacity-50 mb-1">${isMe ? 'Вы' : user}</span>
                    <p class="text-sm leading-tight">${text}</p>
                </div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #451a03; border-radius: 10px; }
    </style>
</body>
</html>
